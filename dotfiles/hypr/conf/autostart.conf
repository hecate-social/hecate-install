# -----------------------------------------------------
# Autostart - Minimal
# -----------------------------------------------------

# Start Polkit (required for privilege escalation)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Load Dunst Notification Manager
exec-once = dunst

# Using hypridle to start hyprlock (screen locking)
exec-once = hypridle

# start waybar (status bar) with explicit minimal config
exec-once = waybar -c ~/.config/waybar/config -s ~/.config/waybar/style.css

