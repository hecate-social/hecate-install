# -----------------------------------------------------
# General window decoration
# name: "No rounding, no blur"
# -----------------------------------------------------

decoration {
    rounding = 1
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    blur {
        enabled = true
        size = 2
        passes = 1
        new_optimizations = on
        ignore_opacity = false
    }

    shadow {
        enabled = false
    }
}
