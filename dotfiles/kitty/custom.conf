# Custom Configuration

# Fix INS and DEL key behavior
map insert send_text all \e[2~
map delete send_text all \e[3~

# Additional key fixes
map home send_text all \e[H
map end send_text all \e[F
map page_up send_text all \e[5~
map page_down send_text all \e[6~

