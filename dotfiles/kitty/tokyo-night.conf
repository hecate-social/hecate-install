# Tokyo Night color scheme for Kitty
# Based on https://github.com/folke/tokyonight.nvim

# The basic colors
foreground              #c0caf5
background              #0f0f14
selection_foreground    #0f0f14
selection_background    #33467c

# Cursor colors
cursor                  #c0caf5
cursor_text_color       #0f0f14

# URL underline color when hovering with mouse
url_color               #7dcfff

# Kitty window border colors
active_border_color     #7aa2f7
inactive_border_color   #414868
bell_border_color       #e0af68

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #0f0f14
active_tab_background   #7aa2f7
inactive_tab_foreground #c0caf5
inactive_tab_background #0a0a0c
tab_bar_background      #0f0f14

# Colors for marks (marked text in the terminal)
mark1_foreground #0f0f14
mark1_background #7aa2f7
mark2_foreground #0f0f14
mark2_background #bb9af7
mark3_foreground #0f0f14
mark3_background #7dcfff

# The 16 terminal colors

# black
color0 #15161e
color8 #414868

# red
color1 #f7768e
color9 #f7768e

# green
color2  #9ece6a
color10 #9ece6a

# yellow
color3  #e0af68
color11 #e0af68

# blue
color4  #7aa2f7
color12 #7aa2f7

# magenta
color5  #bb9af7
color13 #bb9af7

# cyan
color6  #7dcfff
color14 #7dcfff

# white
color7  #a9b1d6
color15 #c0caf5
