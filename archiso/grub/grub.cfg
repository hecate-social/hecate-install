# hecatOS GRUB configuration for live ISO

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod loopback
insmod linux
insmod normal
insmod search
insmod search_fs_file
insmod search_fs_uuid
insmod search_label

set default=0
set timeout=5
set gfxmode=auto
set gfxpayload=keep

insmod gfxterm
terminal_output gfxterm

menuentry "hecatOS Live (Hyprland Desktop)" --class arch --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=n
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "hecatOS Live (Copy to RAM)" --class arch --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=y
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "hecatOS Live (NVIDIA, proprietary)" --class arch --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G nvidia-drm.modeset=1
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "System shutdown" --class shutdown {
    echo "Shutting down..."
    halt
}

menuentry "System restart" --class restart {
    echo "Restarting..."
    reboot
}
