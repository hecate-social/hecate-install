name: Build hecatOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-live-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Build hecatOS Live ISO
        run: nix build .#iso --out-link result

      - name: Rename ISO
        run: |
          iso_file=$(find result/iso -name '*.iso' | head -1)
          version="${GITHUB_REF_NAME:-dev}"
          cp "$iso_file" "hecatos-live-${version}.iso"
          sha256sum "hecatos-live-${version}.iso" >> SHA256SUMS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hecatos-live-iso
          path: |
            hecatos-live-*.iso
            SHA256SUMS
          retention-days: 3

  build-installer-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Build hecatOS Installer ISO
        run: nix build .#installer-iso --out-link result

      - name: Rename ISO
        run: |
          iso_file=$(find result/iso -name '*.iso' | head -1)
          version="${GITHUB_REF_NAME:-dev}"
          cp "$iso_file" "hecatos-installer-${version}.iso"
          sha256sum "hecatos-installer-${version}.iso" >> SHA256SUMS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hecatos-installer-iso
          path: |
            hecatos-installer-*.iso
            SHA256SUMS
          retention-days: 3

  release:
    needs: [build-live-iso, build-installer-iso]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Live ISO
        uses: actions/download-artifact@v4
        with:
          name: hecatos-live-iso
          path: artifacts/live

      - name: Download Installer ISO
        uses: actions/download-artifact@v4
        with:
          name: hecatos-installer-iso
          path: artifacts/installer

      - name: Prepare release assets
        run: |
          cp artifacts/installer/hecatos-installer-*.iso .
          cp artifacts/live/hecatos-live-*.iso .

          # GitHub Releases has a 2GB per-asset limit
          # Split any ISO exceeding 1.9GB into parts
          max_size=1900000000
          for iso in hecatos-*.iso; do
            size=$(stat -c%s "$iso")
            if [ "$size" -gt "$max_size" ]; then
              echo "Splitting $iso ($size bytes) into 1.9GB parts..."
              split -b 1900m -d --additional-suffix=.iso.part "$iso" "${iso%.iso}-"
              rm "$iso"
              echo "# Reassemble with: cat ${iso%.iso}-*.iso.part > $iso" >> DOWNLOAD.md
            fi
          done

          # Generate checksums for all release files (full ISOs and parts)
          sha256sum hecatos-*.iso hecatos-*.iso.part 2>/dev/null > SHA256SUMS || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: hecatOS ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## hecatOS ${{ github.ref_name }}

            Two ISOs are available:

            ### Live Desktop ISO (Try + Install)
            Boot into a full Hyprland desktop. Explore hecatOS, then click "Install hecatOS" when ready.

            - **Hyprland** window manager (Tokyo Night theme)
            - **Kitty** terminal, **Zsh** + Starship prompt
            - **Neovim** (LazyVim), **Firefox**, **Waybar**, **Rofi**, **Dunst**
            - **Developer tools**: bat, eza, fzf, zoxide, lazygit, podman
            - **Hecate daemon** + **Ollama** pre-loaded
            - **wayvnc** for remote desktop access (port 5900)
            - **Super+Shift+I** to launch installer

            ### Installer ISO (Unattended)
            Headless ISO that auto-detects hardware, selects role, partitions disk, and installs. No interaction needed.

            ### Roles (chosen during install)

            | Role | What It Does |
            |------|-------------|
            | **Standalone** | Full stack on one machine |
            | **Cluster** | BEAM cluster member |
            | **Inference** | Ollama-only GPU server |
            | **Workstation** | Standalone + desktop |
            | **Desktop** | Full daily-driver desktop |

            ### Download & Write to USB

            **Installer ISO** — single file, download directly.

            **Live Desktop ISO** — split into parts (>2GB). Reassemble first:
            ```bash
            cat hecatos-live-${{ github.ref_name }}-*.iso.part > hecatos-live-${{ github.ref_name }}.iso
            ```

            Then write to USB:
            ```bash
            # Live desktop (Try + Install)
            sudo dd if=hecatos-live-${{ github.ref_name }}.iso of=/dev/sdX bs=4M status=progress

            # Unattended installer
            sudo dd if=hecatos-installer-${{ github.ref_name }}.iso of=/dev/sdX bs=4M status=progress
            ```

            ### Verify

            ```bash
            sha256sum -c SHA256SUMS
            ```
          files: |
            hecatos-live-*.iso
            hecatos-live-*.iso.part
            hecatos-installer-*.iso
            SHA256SUMS
          generate_release_notes: true

      - name: Delete build artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            hecatos-live-iso
            hecatos-installer-iso
